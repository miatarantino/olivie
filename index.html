<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Куча-Мала!</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; overscroll-behavior: none; touch-action: none; }
  body {
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(160deg, #241b3e 0%, #171028 100%);
    display: flex; flex-direction: column; align-items: center;
    height: 100dvh; user-select: none; -webkit-user-select: none;
  }
  #hud {
    width: 100%; max-width: 480px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px 6px; color: #fff; gap: 6px;
  }
  .scorebox { text-align: center; line-height: 1.1; min-width: 54px; }
  .scorebox .lbl { font-size: 9px; opacity: .6; text-transform: uppercase; letter-spacing: 1px; }
  .scorebox .val { font-size: 22px; font-weight: 800; }
  #title { text-align: center; flex: 1; }
  #title .t {
    font-size: 19px; font-weight: 900; letter-spacing: .5px;
    background: linear-gradient(90deg, #ffb703, #ff5d8f, #ffb703);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-transform: uppercase;
  }
  #hudBtns { display: flex; justify-content: center; gap: 8px; margin-top: 3px; }
  .btn {
    background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.18);
    color: #fff; border-radius: 10px; padding: 2px 12px; font-size: 13px; cursor: pointer; line-height: 1.5;
  }
  #stage { flex: 1; width: 100%; max-width: 480px; display: flex; align-items: center; justify-content: center; min-height: 0; padding: 2px 8px; }
  #game { border-radius: 18px; box-shadow: 0 10px 40px rgba(0,0,0,.5); display: block; }
  #chainwrap { width: 100%; max-width: 480px; padding: 6px 8px calc(9px + env(safe-area-inset-bottom)); }
  #chain { display: flex; align-items: flex-end; justify-content: center; gap: 3px; overflow-x: auto; scrollbar-width: none; }
  #chain::-webkit-scrollbar { display: none; }
  #chain img { display: block; filter: drop-shadow(0 1px 2px rgba(0,0,0,.5)); }
  .arr { color: rgba(255,255,255,.35); font-size: 11px; align-self: center; }

  .overlay {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(18, 11, 36, .84); z-index: 10; backdrop-filter: blur(5px);
  }
  .card {
    background: #fdf6ec; border-radius: 22px; padding: 24px 26px; text-align: center;
    max-width: 340px; width: 88%; max-height: 82dvh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  .card h2 { font-size: 24px; color: #241b3e; margin-bottom: 4px; }
  .card p { color: #6b5d4f; font-size: 13px; margin-bottom: 12px; }
  .card .big { font-size: 42px; font-weight: 900; color: #e07b00; line-height: 1.1; }
  .card .bst { font-size: 12px; color: #9c8a75; margin: 6px 0 12px; }
  .primary {
    background: linear-gradient(135deg, #ff8f3c, #e05a00); color: #fff; border: none;
    font-size: 16px; font-weight: 700; padding: 12px 26px; border-radius: 14px; cursor: pointer;
    box-shadow: 0 6px 18px rgba(224, 90, 0, .4); margin: 4px;
  }
  .secondary {
    background: none; border: 2px solid #d9c6a8; color: #8a704d;
    font-size: 15px; font-weight: 700; padding: 10px 20px; border-radius: 14px; cursor: pointer; margin: 4px;
  }
  #nameInput {
    width: 100%; padding: 10px 12px; font-size: 16px; border: 2px solid #d9c6a8;
    border-radius: 12px; margin-bottom: 10px; text-align: center; background: #fff; color: #241b3e;
    outline: none;
  }
  #boardList { list-style: none; text-align: left; margin: 10px 0 14px; }
  #boardList li {
    display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 10px;
    font-size: 15px; color: #241b3e;
  }
  #boardList li:nth-child(odd) { background: rgba(224, 123, 0, .07); }
  #boardList li.me { background: #ffe3bd; font-weight: 800; }
  #boardList .rank { width: 26px; text-align: center; font-weight: 800; color: #b08a55; }
  #boardList .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #boardList .sc { font-weight: 800; color: #e07b00; }
  .empty { color: #9c8a75; font-size: 14px; padding: 14px 0; }
</style>
</head>
<body>
  <div id="hud">
    <div class="scorebox"><div class="lbl">Счёт</div><div class="val" id="score">0</div></div>
    <div id="title">
      <div class="t">Куча-Мала!</div>
      <div id="hudBtns">
        <button class="btn" id="boardBtn">🏆</button>
        <button class="btn" id="muteBtn">🔊</button>
        <button class="btn" id="restartBtn">↺</button>
      </div>
    </div>
    <div class="scorebox"><div class="lbl">Рекорд</div><div class="val" id="best">0</div></div>
  </div>
  <div id="stage"><canvas id="game"></canvas></div>
  <div id="chainwrap"><div id="chain"></div></div>

  <div class="overlay" id="over">
    <div class="card">
      <h2>Куча до потолка! 🙈</h2>
      <p>родня не поместилась — бывает 😅</p>
      <div class="big" id="foScore">0</div>
      <div class="bst">Личный рекорд: <b id="foBest">0</b></div>
      <input id="nameInput" maxlength="20" placeholder="Твоё имя">
      <div>
        <button class="primary" id="saveBtn">В таблицу 🏆</button>
        <button class="secondary" id="againBtn">Ещё раз</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="board">
    <div class="card">
      <h2>🏆 Таблица лидеров</h2>
      <p id="boardHint">кто собрал самую большую кучу — от пуделя до шпица</p>
      <ol id="boardList"></ol>
      <button class="primary" id="closeBoardBtn">Играть</button>
    </div>
  </div>

<script>/* ============ СЕМЕЙНЫЙ ЗАМЕС — merge-игра с фигурками семьи ============ */
const CHARACTERS = [
  { name: 'Чёрный пудель', ring: '#e74c3c' },
  { name: 'Белый пудель',  ring: '#e67e22' },
  { name: 'Малой',         ring: '#f1c40f' },
  { name: 'Пират',         ring: '#8e6e3a' },
  { name: 'Бабушка',       ring: '#2ecc71' },
  { name: 'Дед',           ring: '#95a5a6' },
  { name: 'Пенный',        ring: '#3498db' },
  { name: 'Дядя',          ring: '#34495e' },
  { name: 'Виктория',      ring: '#e91e63' },
  { name: 'Кошатница',     ring: '#9b59b6' },
  { name: 'Парочка',       ring: '#ff4d6d' },
  { name: 'Шпиц',          ring: '#ffb703' },
];
const RADII  = [20, 25, 29, 35, 42, 50, 61, 73, 88, 106, 127, 153];
const POINTS = [1, 3, 6, 10, 15, 21, 28, 36, 45, 55, 66, 78];
const W = 420, H = 720;
const DROP_Y = 80, LOSE_Y = 132, LOSE_MS = 2200;

const { Engine, Bodies, Body, Composite, Events } = Matter;

/* ---------- Telegram WebApp ---------- */
const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
if (tg) {
  try {
    tg.ready(); tg.expand();
    if ('isVerticalSwipesEnabled' in tg) tg.isVerticalSwipesEnabled = false;
    if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
    if (tg.setHeaderColor) tg.setHeaderColor('#241b3e');
    if (tg.setBackgroundColor) tg.setBackgroundColor('#171028');
  } catch (e) {}
}
function haptic(kind) {
  if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred(kind); } catch (e) {} }
}

/* ---------- спрайты ---------- */
const IMGS = SPRITES.map(sp => { const im = new Image(); im.src = sp.s; return im; });
IMGS.forEach((im, i) => { im.onload = () => { try { cacheSprite(i); buildChain(); } catch (e) {} }; });
// масштаб: среднее между вписыванием по большей стороне и по ср.геометрическому
function spriteScale(lv) {
  const sp = SPRITES[lv];
  const gm = Math.sqrt(sp.w * sp.h);
  const denom = 0.5 * (Math.max(sp.w, sp.h) + gm);
  return (2 * RADII[lv]) / denom;
}
// кеш: спрайт с уже «запечённой» мягкой тенью — дёшево рисуется каждый кадр
const SPRITE_CACHE = [];
function cacheSprite(lv) {
  const sp = SPRITES[lv], k = spriteScale(lv), pad = 20, ss = 2;
  const w = Math.ceil(sp.w * k) + pad * 2, h = Math.ceil(sp.h * k) + pad * 2;
  const cv = document.createElement('canvas');
  cv.width = w * ss; cv.height = h * ss;
  const x = cv.getContext('2d');
  x.scale(ss, ss);
  x.shadowColor = 'rgba(40,20,10,0.33)';
  x.shadowBlur = 12;
  x.drawImage(IMGS[lv], pad, pad, sp.w * k, sp.h * k);
  SPRITE_CACHE[lv] = { cv, w, h };
}

/* ---------- звук (мягкий, через фильтр) ---------- */
let AC = null, muted = false, master = null;
function ac() {
  if (!AC) {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value = 0.55;
    const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 2400;
    master.connect(lp); lp.connect(AC.destination);
  }
  if (AC.state === 'suspended') AC.resume();
  return AC;
}
function tone(f0, f1, dur, vol, type, when) {
  if (muted) return;
  try {
    const c = ac(), t0 = c.currentTime + (when || 0);
    const o = c.createOscillator(), g = c.createGain();
    o.type = type || 'sine';
    o.frequency.setValueAtTime(f0, t0);
    if (f1 !== f0) o.frequency.exponentialRampToValueAtTime(Math.max(f1, 30), t0 + dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol, t0 + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(master);
    o.start(t0); o.stop(t0 + dur + 0.03);
  } catch (e) {}
}
const sndDrop = () => tone(300, 130, 0.12, 0.16);            // мягкий «плюх»
const PENTA = [0, 2, 4, 7, 9];                                // пентатоника — всегда приятно
function sndMerge(lv) {
  const st = PENTA[lv % 5] + 12 * Math.floor(lv / 5);
  const f = 294 * Math.pow(2, st / 12);
  tone(f, f, 0.25, 0.2, 'triangle');
  tone(f * 2, f * 2, 0.18, 0.06, 'sine', 0.02);
  tone(f * 1.5, f * 1.5, 0.3, 0.05, 'sine', 0.06);
}

/* ---------- хранилище ---------- */
function lsGet(k, d) { try { const v = localStorage.getItem(k); return v === null ? d : v; } catch (e) { return d; } }
function lsSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }

/* ---------- состояние ---------- */
let engine, score = 0, best = +lsGet('zames_best', 0), gameOver = false, wonShown = false;
let current = null, next = pickLevel(), canDrop = true, aimX = W / 2;
let particles = [], popups = [], rings = [], flashes = [], overSince = 0, banner = null;
let lastEntryT = 0, autoName = '';
muted = lsGet('zames_mute', '0') === '1';

function pickLevel() {
  const r = Math.random();
  if (r < 0.24) return 0;
  if (r < 0.48) return 1;
  if (r < 0.70) return 2;
  if (r < 0.88) return 3;
  return 4;
}

function makeBubble(level, x, y) {
  const b = Bodies.circle(x, y, RADII[level], {
    restitution: 0.12, friction: 0.35, frictionStatic: 0.5, density: 0.0012,
  });
  b.fm = { level, born: performance.now(), scale: 0.01 };
  Composite.add(engine.world, b);
  return b;
}

function initEngine() {
  engine = Engine.create({ gravity: { x: 0, y: 1.0, scale: 0.0012 } });
  const wall = { isStatic: true };
  Composite.add(engine.world, [
    Bodies.rectangle(W / 2, H + 40, W + 200, 80, wall),
    Bodies.rectangle(-40, H / 2, 80, H * 2, wall),
    Bodies.rectangle(W + 40, H / 2, 80, H * 2, wall),
  ]);
  Events.on(engine, 'collisionStart', onCollide);
  Events.on(engine, 'collisionActive', onCollide); // ловим и уже лежащие друг на друге пары
}

const mergeQueue = [];
function onCollide(ev) {
  for (const p of ev.pairs) {
    const a = p.bodyA, b = p.bodyB;
    if (!a.fm || !b.fm) continue;
    if (a.fm.dead || b.fm.dead) continue;
    if (a.fm.level !== b.fm.level) continue;
    a.fm.dead = b.fm.dead = true;
    mergeQueue.push([a, b]);
  }
}

function processMerges() {
  while (mergeQueue.length) {
    const [a, b] = mergeQueue.shift();
    const lv = a.fm.level + 1;
    const mx = (a.position.x + b.position.x) / 2;
    const my = (a.position.y + b.position.y) / 2;
    Composite.remove(engine.world, a);
    Composite.remove(engine.world, b);
    if (lv >= CHARACTERS.length) {
      // два шпица: лопаются с большим бонусом — играем бесконечно
      score += 100;
      popups.push({ x: mx, y: my - 60, t: 0, txt: '+100' });
      celebrate(mx, my);
      rings.push({ x: mx, y: my, r: 60, max: 300, life: 1, color: '#ffb703' });
      flashes.push({ x: mx, y: my, r: 170, life: 1 });
      banner = { t: 0, txt: '💥 ДВОЙНОЙ ШПИЦ! +100' };
      haptic('heavy');
      updateHud();
      continue;
    }
    const nb = makeBubble(lv, Math.max(RADII[lv], Math.min(W - RADII[lv], mx)), Math.min(my, H - RADII[lv] - 2));
    Body.setVelocity(nb, { x: 0, y: -1.5 });
    nb.fm.mergeT = 0;   // упругая анимация появления
    score += POINTS[lv];
    popups.push({ x: mx, y: my - RADII[lv], t: 0, txt: '+' + POINTS[lv] });
    burst(mx, my, CHARACTERS[lv].ring, RADII[lv]);
    rings.push({ x: mx, y: my, r: RADII[lv] * 0.5, max: RADII[lv] * 2.1, life: 1, color: CHARACTERS[lv].ring });
    flashes.push({ x: mx, y: my, r: RADII[lv] * 1.1, life: 1 });
    sndMerge(lv);
    haptic(lv >= 8 ? 'heavy' : 'light');
    if (lv === CHARACTERS.length - 1 && !wonShown) { wonShown = true; celebrate(mx, my); banner = { t: 0, txt: '🎉 ВСЯ СЕМЬЯ В СБОРЕ!' }; }
    updateHud();
  }
}

function burst(x, y, color, r) {
  for (let i = 0; i < 14; i++) {
    const a = Math.random() * 6.283, s = 1.5 + Math.random() * 3;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 1, life: 1, color, r: 2 + Math.random() * (r / 12) });
  }
}
function celebrate(x, y) {
  for (let i = 0; i < 90; i++) {
    const a = Math.random() * 6.283, s = 2 + Math.random() * 6;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 3, life: 1.6, color: ['#ffb703', '#ff4d6d', '#3498db', '#2ecc71', '#f1c40f'][i % 5], r: 3 + Math.random() * 4 });
  }
  tone(523, 523, 0.4, 0.22, 'triangle'); tone(659, 659, 0.4, 0.2, 'triangle', 0.15); tone(784, 784, 0.6, 0.2, 'triangle', 0.3); tone(1047, 1047, 0.7, 0.12, 'sine', 0.45);
}

/* ---------- броски ---------- */
function spawnCurrent() { current = { level: next }; next = pickLevel(); }
function clampAim(x, lv) { return Math.max(RADII[lv] + 6, Math.min(W - RADII[lv] - 6, x)); }
function drop() {
  if (!canDrop || gameOver || !current) return;
  canDrop = false;
  const b = makeBubble(current.level, clampAim(aimX, current.level), DROP_Y);
  Body.setVelocity(b, { x: 0, y: 2 });
  sndDrop();
  haptic('light');
  current = null;
  setTimeout(() => { if (!gameOver) { spawnCurrent(); canDrop = true; } }, 480);
}

/* ---------- проигрыш ---------- */
function checkLose(now) {
  let danger = false;
  for (const b of Composite.allBodies(engine.world)) {
    if (!b.fm || b.fm.dead) continue;
    if (now - b.fm.born < 900) continue;
    if (b.position.y - RADII[b.fm.level] < LOSE_Y && Math.abs(b.velocity.y) < 0.35) { danger = true; break; }
  }
  if (danger) {
    if (!overSince) overSince = now;
    else if (now - overSince > LOSE_MS) endGame();
  } else overSince = 0;
}
function endGame() {
  gameOver = true;
  if (score > best) { best = score; lsSet('zames_best', String(best)); }
  // рекорд записывается автоматически после КАЖДОЙ игры
  autoName = playerName() || 'Игрок';
  lastEntryT = Date.now();
  if (score > 0) saveScoreEntry(autoName, score, lastEntryT);
  document.getElementById('foScore').textContent = score;
  document.getElementById('foBest').textContent = best;
  document.getElementById('nameInput').value = autoName === 'Игрок' ? '' : autoName;
  document.getElementById('over').style.display = 'flex';
  tone(392, 392, 0.25, 0.16, 'triangle'); tone(311, 311, 0.3, 0.14, 'triangle', 0.22); tone(233, 175, 0.55, 0.13, 'triangle', 0.45);
  haptic('heavy');
}
function restart() {
  Events.off(engine, 'collisionStart', onCollide);
  Engine.clear(engine);
  score = 0; gameOver = false; wonShown = false; overSince = 0; mergeQueue.length = 0;
  particles = []; popups = []; rings = []; flashes = []; canDrop = true;
  document.getElementById('over').style.display = 'none';
  document.getElementById('board').style.display = 'none';
  initEngine(); spawnCurrent(); updateHud();
}

/* ---------- таблица лидеров ---------- */
/* Пока рекорды хранятся на устройстве. Для общего онлайн-топа сюда
   подключим сервер (SYNC_URL) когда сделаем Telegram-бота. */
const SYNC_URL = '';
function playerName() {
  let n = '';
  try { n = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.first_name) || ''; } catch (e) {}
  return n || lsGet('zames_name', '');
}
function loadBoard() { try { return JSON.parse(lsGet('zames_board', '[]')); } catch (e) { return []; } }
function saveScoreEntry(name, sc, t) {
  const bd = loadBoard();
  bd.push({ n: name, s: sc, t: t || Date.now() });
  bd.sort((a, b) => b.s - a.s);
  lsSet('zames_board', JSON.stringify(bd.slice(0, 100)));
}
function renameEntry(t, newName) {
  const bd = loadBoard();
  for (const e of bd) if (e.t === t) e.n = newName;
  lsSet('zames_board', JSON.stringify(bd));
}
function showBoard(highlightName) {
  const bd = loadBoard();
  const bestBy = {};
  for (const e of bd) if (!bestBy[e.n] || e.s > bestBy[e.n].s) bestBy[e.n] = e;
  const rows = Object.values(bestBy).sort((a, b) => b.s - a.s).slice(0, 10);
  const ol = document.getElementById('boardList');
  ol.innerHTML = '';
  if (!rows.length) {
    ol.innerHTML = '<div class="empty">Пока пусто — сыграй первым! 🎮</div>';
  } else {
    const medals = ['🥇', '🥈', '🥉'];
    rows.forEach((e, i) => {
      const li = document.createElement('li');
      if (highlightName && e.n === highlightName) li.className = 'me';
      li.innerHTML = '<span class="rank">' + (medals[i] || (i + 1)) + '</span><span class="nm"></span><span class="sc">' + e.s + '</span>';
      li.querySelector('.nm').textContent = e.n;
      ol.appendChild(li);
    });
  }
  document.getElementById('board').style.display = 'flex';
}
document.getElementById('saveBtn').addEventListener('click', () => {
  const inp = document.getElementById('nameInput');
  const name = (inp.value || '').trim() || autoName || 'Игрок';
  lsSet('zames_name', name);
  if (name !== autoName && lastEntryT) renameEntry(lastEntryT, name); // запись уже создана автоматически — просто переименуем
  document.getElementById('over').style.display = 'none';
  showBoard(name);
});
document.getElementById('boardBtn').addEventListener('click', () => showBoard(null));
document.getElementById('closeBoardBtn').addEventListener('click', () => {
  document.getElementById('board').style.display = 'none';
  if (gameOver) restart();
});

/* ---------- отрисовка ---------- */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize() {
  const box = document.getElementById('stage');
  const s = Math.min(box.clientWidth / W, box.clientHeight / H);
  const vw = Math.floor(W * s), vh = Math.floor(H * s);
  const dpr = window.devicePixelRatio || 1;
  canvas.style.width = vw + 'px'; canvas.style.height = vh + 'px';
  canvas.width = Math.floor(vw * dpr); canvas.height = Math.floor(vh * dpr);
  ctx.setTransform((vw / W) * dpr, 0, 0, (vh / H) * dpr, 0, 0);
}
window.addEventListener('resize', resize);

function drawSprite(x, y, lv, angle, scaleMul) {
  const c = SPRITE_CACHE[lv];
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  if (c) {
    ctx.scale(scaleMul, scaleMul);
    ctx.drawImage(c.cv, -c.w / 2, -c.h / 2, c.w, c.h);
  } else {
    ctx.beginPath(); ctx.arc(0, 0, RADII[lv] * scaleMul, 0, 7);
    ctx.fillStyle = CHARACTERS[lv].ring; ctx.fill();
  }
  ctx.restore();
}

function render(now) {
  ctx.clearRect(0, 0, W, H);
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#fdf6ec'); bg.addColorStop(1, '#f3e2c4');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // пульсирующее предупреждение, когда куча у критической линии
  if (overSince && !gameOver) {
    const pulse = 0.16 + 0.13 * Math.sin(now / 110);
    const warn = ctx.createLinearGradient(0, 0, 0, LOSE_Y + 40);
    warn.addColorStop(0, 'rgba(231,76,60,' + pulse.toFixed(3) + ')');
    warn.addColorStop(1, 'rgba(231,76,60,0)');
    ctx.fillStyle = warn; ctx.fillRect(0, 0, W, LOSE_Y + 40);
  }
  ctx.setLineDash([8, 8]);
  ctx.strokeStyle = overSince ? 'rgba(231,76,60,0.9)' : 'rgba(180,150,110,0.45)';
  ctx.lineWidth = overSince ? 3 : 2;
  ctx.beginPath(); ctx.moveTo(0, LOSE_Y); ctx.lineTo(W, LOSE_Y); ctx.stroke();
  ctx.setLineDash([]);

  if (current && !gameOver) {
    const cx = clampAim(aimX, current.level);
    ctx.strokeStyle = 'rgba(180,150,110,0.3)'; ctx.lineWidth = 2;
    ctx.setLineDash([4, 10]);
    ctx.beginPath(); ctx.moveTo(cx, DROP_Y); ctx.lineTo(cx, H); ctx.stroke();
    ctx.setLineDash([]);
    drawSprite(cx, DROP_Y, current.level, 0, 1);
  }

  for (const b of Composite.allBodies(engine.world)) {
    if (!b.fm) continue;
    const pl = b.fm;
    let sc;
    if (pl.mergeT !== undefined && pl.mergeT < 1.6) {
      pl.mergeT += 0.055; // упругий «выпрыг» с перелётом
      sc = 1 - Math.exp(-4.2 * pl.mergeT) * Math.cos(8.5 * pl.mergeT);
    } else {
      if (pl.scale < 1) pl.scale = Math.min(1, pl.scale + 0.12);
      sc = pl.scale;
    }
    drawSprite(b.position.x, b.position.y, pl.level, b.angle, Math.max(0.05, sc));
  }

  // вспышка при слиянии
  flashes = flashes.filter(f => f.life > 0);
  for (const f of flashes) {
    f.life -= 0.09;
    ctx.globalAlpha = Math.max(0, f.life) * 0.55;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(f.x, f.y, f.r * (1 + (1 - f.life) * 0.4), 0, 7); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // расходящееся кольцо
  rings = rings.filter(rg => rg.life > 0);
  for (const rg of rings) {
    rg.life -= 0.045;
    rg.r += (rg.max - rg.r) * 0.16;
    ctx.globalAlpha = Math.max(0, rg.life) * 0.7;
    ctx.strokeStyle = rg.color;
    ctx.lineWidth = 3 + rg.life * 3;
    ctx.beginPath(); ctx.arc(rg.x, rg.y, rg.r, 0, 7); ctx.stroke();
  }
  ctx.globalAlpha = 1;

  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life -= 0.022;
    ctx.globalAlpha = Math.max(0, Math.min(1, p.life));
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill();
  }
  ctx.globalAlpha = 1;

  popups = popups.filter(p => p.t < 1);
  for (const p of popups) {
    p.t += 0.02;
    ctx.globalAlpha = 1 - p.t;
    ctx.font = 'bold 22px system-ui';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#e07b00';
    ctx.fillText(p.txt, p.x, p.y - p.t * 40);
  }
  ctx.globalAlpha = 1;

  // победный баннер
  if (banner) {
    banner.t += 0.016;
    const bt = banner.t;
    if (bt > 3.2) { banner = null; }
    else {
      const appear = Math.min(1, bt * 3);
      const fade = bt > 2.4 ? Math.max(0, 1 - (bt - 2.4) / 0.8) : 1;
      const sc = 1 + 0.12 * Math.exp(-3 * bt) * Math.sin(9 * bt);
      ctx.save();
      ctx.globalAlpha = appear * fade;
      ctx.translate(W / 2, H * 0.4);
      ctx.scale(sc, sc);
      let fs = 34;
      ctx.font = '900 ' + fs + 'px system-ui';
      while (ctx.measureText(banner.txt).width > W - 44 && fs > 16) {
        fs -= 2; ctx.font = '900 ' + fs + 'px system-ui';
      }
      ctx.textAlign = 'center';
      ctx.lineWidth = 8; ctx.strokeStyle = 'rgba(255,255,255,0.9)';
      ctx.strokeText(banner.txt, 0, 0);
      ctx.fillStyle = '#e0218a';
      ctx.fillText(banner.txt, 0, 0);
      ctx.restore();
    }
  }
}

function updateHud() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = Math.max(best, score);
}

/* ---------- цепочка эволюции ---------- */
function buildChain() {
  const el = document.getElementById('chain');
  el.innerHTML = '';
  CHARACTERS.forEach((ch, i) => {
    const img = document.createElement('img');
    img.src = SPRITES[i].s;
    const hpx = 16 + i * 2.2;
    img.style.height = hpx + 'px';
    img.title = ch.name;
    el.appendChild(img);
    if (i < CHARACTERS.length - 1) {
      const s = document.createElement('span'); s.className = 'arr'; s.textContent = '›';
      el.appendChild(s);
    }
  });
}

/* ---------- ввод ---------- */
function evX(e) {
  const rect = canvas.getBoundingClientRect();
  const clientX = (e.touches ? e.touches[0].clientX : e.clientX);
  return (clientX - rect.left) / rect.width * W;
}
let pointerDown = false;
canvas.addEventListener('pointerdown', e => { pointerDown = true; aimX = evX(e); e.preventDefault(); });
canvas.addEventListener('pointermove', e => { if (pointerDown || e.pointerType === 'mouse') aimX = evX(e); });
window.addEventListener('pointerup', () => { if (pointerDown) { pointerDown = false; drop(); } });
canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

let restartArm = 0;
document.getElementById('restartBtn').addEventListener('click', function () {
  const now = Date.now();
  if (now - restartArm < 2000) { this.textContent = '↺'; restart(); }
  else { restartArm = now; this.textContent = '❗'; setTimeout(() => { this.textContent = '↺'; }, 2000); }
});
document.getElementById('againBtn').addEventListener('click', restart);
const muteBtnEl = document.getElementById('muteBtn');
muteBtnEl.textContent = muted ? '🔇' : '🔊';
muteBtnEl.addEventListener('click', function () {
  muted = !muted; lsSet('zames_mute', muted ? '1' : '0'); this.textContent = muted ? '🔇' : '🔊';
});
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('contextmenu', e => { if (e.target === canvas) e.preventDefault(); });

/* ---------- цикл ---------- */
let last = performance.now();
function loop(now) {
  const dt = Math.min(now - last, 33); last = now;
  if (!gameOver) {
    Engine.update(engine, dt);
    processMerges();
    checkLose(now);
  }
  render(now);
  requestAnimationFrame(loop);
}

initEngine();
buildChain();
resize();
spawnCurrent();
updateHud();
requestAnimationFrame(loop);
</script>
</body>
</html>
